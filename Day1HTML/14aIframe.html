<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main Page</title>
  <link rel="stylesheet" href="./style/8Style.css" />
  <style>
    iframe {
      border: 2px solid black;
      width: 100%;
      max-width: 720px;
      min-height: 220px;
    }
  </style>
</head>

<body>
  <header>
    <h1>iframe Example</h1>
    <p>An iframe displays another HTML document inside this page.</p>
  </header>

  <main>
    <section>
      <h2>Embedded page</h2>
      <iframe src="14bIframe.html" title="Embedded Content"></iframe>
    </section>

    <section>
      <h2>Concept</h2>
      <p>Use iframe when you need to embed a separate HTML page, such as a map, video player, or document preview.</p>
    </section>
  </main>
</body>

</html>
