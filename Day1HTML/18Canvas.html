<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Demo</title>
    <link rel="stylesheet" href="./style/8Style.css" />
    <style>
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>

<body>
    <header>
        <h1>Canvas Demo</h1>
        <p>The canvas element draws graphics with JavaScript.</p>
    </header>

    <main>
        <section>
            <h2>Drawing area</h2>
            <canvas id="myCanvas" width="500" height="400"></canvas>
        </section>

        <section>
            <h2>What the script draws</h2>
            <ul>
                <li>A blue line</li>
                <li>A green rectangle</li>
                <li>A red circle</li>
                <li>A text label</li>
            </ul>
        </section>
    </main>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        ctx.moveTo(50, 50);
        ctx.lineTo(200, 50);
        ctx.strokeStyle = "blue";
        ctx.lineWidth = 5;
        ctx.stroke();

        ctx.beginPath();
        ctx.rect(50, 100, 200, 100);
        ctx.fillStyle = "green";
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(300, 300, 50, 0, 2 * Math.PI);
        ctx.fillStyle = "red";
        ctx.fill();
        ctx.stroke();

        ctx.font = "24px Arial";
        ctx.fillStyle = "black";
        ctx.fillText("Hello Canvas!", 50, 350);
    </script>
</body>

</html>
