<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embedded Content</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f3e8ff;
      color: #1f2937;
    }

    h1 {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <header>
    <h1>Embedded Content Page</h1>
    <p>This page is designed to be displayed inside an iframe.</p>
  </header>

  <main>
    <section>
      <h2>About this example</h2>
      <p>An iframe lets one HTML document display another HTML document inside the page.</p>
    </section>
  </main>
</body>

</html>
