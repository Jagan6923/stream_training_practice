<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio and Video Elements</title>
    <link rel="stylesheet" href="./style/8Style.css" />
</head>

<body>
    <header>
        <h1>Audio and Video Elements Demo</h1>
        <p>These media elements let you embed sound and video directly in an HTML page.</p>
    </header>

    <main>
        <section>
            <h2>Audio</h2>
            <audio controls>
                <source src="music.ogg" type="audio/ogg" />
                Your browser does not support the audio element.
            </audio>
        </section>

        <section>
            <h2>Video</h2>
            <video controls width="640" height="360">
                <source src="konark.mp4" type="video/mp4" />
                Your browser does not support the video element.
            </video>
        </section>
    </main>
</body>

</html>
