<!DOCTYPE html>
<html>
  <head>
    <style>
      .img1 {
        opacity: 1;
      }
      .img2 {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <img
      class="img1"
      src="../images/www.png"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 1.0 (default)</p>
    <img
      class="img2"
      src="../images/www.png"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 0.5</p>
  </body>
</html>
