<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Height and Width Demo</title>
    <link rel="stylesheet" href="./3HeightandWidth.css" />
  </head>
  <body>
    <h1>CSS Height and Width Demonstration</h1>

    <div class="box-fixed">This box has a fixed width and height.</div>

    <div class="box-percentage">
      This box has a width and height set as a percentage of its parent.
    </div>

    <div class="box-auto">
      This box has an automatic width and height, adjusting to the content.
    </div>

    <div class="box-minmax">
      This box has a minimum and maximum width and height.
    </div>
  </body>
</html>
